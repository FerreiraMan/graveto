services:
  backend:
    image: graveto-app
    container_name: backend
    build:
      context: ../..
      dockerfile: infrastructure/docker/graveto/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      GRAVETO_POSTGRES_HOST: postgres

  postgres:
    image: postgres:16-alpine
    container_name: db
    ports:
      - "5432:5432"
    volumes:
      - graveto_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: graveto_db
      POSTGRES_USER: graveto_user
      POSTGRES_PASSWORD: graveto_password

volumes:
  graveto_postgres_data: