spring:
  application:
    name: Graveto
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${GRAVETO_POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:graveto_db}
    username: ${POSTGRES_USER:graveto_user}
    password: ${POSTGRES_PASSWORD:graveto_password}
  sql:
    init:
      mode: always
  flyway:
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/moneytracker
      - classpath:db/migration/identity

server:
  servlet:
    context-path: /api
logging:
  level:
    org.springframework.web: DEBUG

jwt:
  signing-secret: jwt_graveto_secret
  expiration-ms: 3600000
  issuer: >
    graveto-api
